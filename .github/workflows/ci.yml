name: CI

# Déclenché à chaque push et pull request sur master
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ---------------------------------------------------------------------------
  # Android + Desktop (JVM) : tournent sur Linux (rapide, peu de quota consommé).
  # Comme toute la logique est dans commonMain, ce job couvre l'essentiel du code.
  # ---------------------------------------------------------------------------
  android-desktop:
    name: Build & Test (Android + Desktop)
    runs-on: ubuntu-latest

    steps:
      # Récupère le code du repo
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 21 / Corretto = même version + vendor que gradle/gradle-daemon-jvm.properties,
      # pour que Gradle réutilise ce JDK au lieu d'en télécharger un.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      # Installe Gradle + active le cache (dépendances & build) entre les runs
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # local.properties est git-ignored : on le recrée à partir du secret GitHub.
      # À configurer dans : Settings > Secrets and variables > Actions > New repository secret
      #   Name = WEATHER_API_KEY
      # (sdk.dir n'est pas nécessaire : le runner expose déjà ANDROID_SDK_ROOT)
      - name: Create local.properties
        run: echo "weather.api.key=${{ secrets.WEATHER_API_KEY }}" > local.properties

      # Rend le wrapper exécutable (le bit +x peut être perdu sur un repo créé sous Windows)
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Tests partagés (logique JVM + host tests Android)
      # --continue : exécute les deux tâches de test même si la première échoue,
      # pour générer les rapports des deux.
      - name: Run shared tests
        run: ./gradlew --continue :shared:jvmTest :shared:testAndroidHostTest

      # Sauvegarde les rapports HTML de test comme artefact téléchargeable.
      # if: always() est INDISPENSABLE : sans lui, l'étape serait sautée quand
      # les tests échouent (or c'est justement là qu'on veut le rapport).
      - name: Upload test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: shared/build/reports/tests/
          if-no-files-found: ignore

      # Build de l'APK debug Android
      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      # jpackage a besoin de fakeroot (+ binutils) pour fabriquer un .deb sous Linux
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot binutils

      # Build du paquet Desktop installable (.deb sous Linux, via jpackage)
      - name: Build Desktop .deb
        run: ./gradlew :desktopApp:packageDeb

      # (Optionnel) Rend l'APK téléchargeable depuis la page du run dans l'onglet Actions
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-debug
          path: androidApp/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      # Rend le paquet .deb Desktop téléchargeable.
      # ATTENTION : le .deb est SPÉCIFIQUE à Linux (runtime Java embarqué).
      # Pour un .msi Windows ou un .dmg Mac, il faudrait des jobs windows-latest / macos-latest.
      - name: Upload Desktop .deb
        uses: actions/upload-artifact@v4
        with:
          name: desktopApp-linux-deb
          path: desktopApp/build/compose/binaries/main/deb/*.deb
          if-no-files-found: ignore

